name: HDB Resale ETL Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p data/raw data/cleaned data/transformed data/hashed data/failed

      - name: Run pytest
        run: pytest tests/ -v